<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillMap — Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #1e1d1a; --white: #f5f4f0; --off-white: #eeece6;
  --gray-light: #d8d6cf; --gray-mid: #8a8880; --gray-dark: #3a3936;
  --accent: #e8e03a; --accent2: #ff4d2e; --accent3: #2eff9e;
  --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
}
body { font-family: var(--font-body); background: var(--white); color: var(--black); }
.top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 60px; display: flex; align-items: center; padding: 0 2rem; gap: 1.5rem; background: rgba(245,244,240,.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(30,29,26,.1); }
.nav-logo { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 3px; color: var(--black); text-decoration: none; }
.nav-logo span { color: var(--accent); }
.nav-back { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 1.5px; color: var(--gray-mid); text-decoration: none; padding: .4rem .8rem; border: 1px solid rgba(30,29,26,.15); transition: all .2s; }
.nav-back:hover { color: var(--black); border-color: var(--black); }
.nav-right { margin-left: auto; }
.nav-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--black); color: var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: .9rem; cursor: pointer; }

.main-wrap { padding-top: 60px; max-width: 720px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; padding-bottom: 4rem; }
.page-header { padding: 2.5rem 0 1.5rem; border-bottom: 1px solid rgba(30,29,26,.08); margin-bottom: 1.5rem; display: flex; align-items: flex-end; justify-content: space-between; }
.page-title { font-family: var(--font-display); font-size: 2.5rem; letter-spacing: 3px; }
.page-sub { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-mid); margin-top: .3rem; }
.btn-mark-read { padding: .5rem 1rem; background: transparent; border: 1px solid rgba(30,29,26,.15); cursor: pointer; font-family: var(--font-mono); font-size: .62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-mid); transition: all .2s; }
.btn-mark-read:hover { border-color: var(--black); color: var(--black); }

.notif-list { display: flex; flex-direction: column; }
.notif-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1.2rem 0; border-bottom: 1px solid rgba(30,29,26,.07); position: relative; transition: background .15s; cursor: pointer; }
.notif-item:hover { background: rgba(30,29,26,.02); margin: 0 -1rem; padding-left: 1rem; padding-right: 1rem; }
.notif-item.unread::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); }
.notif-item.unread { padding-left: 1rem; }
.notif-icon { width: 40px; height: 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; border: 1px solid rgba(30,29,26,.1); }
.notif-body { flex: 1; }
.notif-title { font-size: .85rem; font-weight: 500; margin-bottom: .2rem; line-height: 1.4; }
.notif-text { font-size: .78rem; color: var(--gray-mid); line-height: 1.5; }
.notif-time { font-family: var(--font-mono); font-size: .6rem; color: var(--gray-mid); letter-spacing: 1px; margin-top: .4rem; }
.notif-item.unread .notif-title { color: var(--black); }
.notif-item.read .notif-title { color: var(--gray-dark); }

.empty-state { text-align: center; padding: 5rem 2rem; }
.empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
.empty-state h2 { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 2px; margin-bottom: .6rem; }
.empty-state p { color: var(--gray-mid); font-size: .85rem; }
</style>
</head>
<body>
<nav class="top-nav">
  <a href="home-client.html" class="nav-logo">SKILL<span>MAP</span></a>
  <a href="home-client.html" class="nav-back">← Accueil</a>
  <div class="nav-right">
    <div class="nav-avatar" id="navAvatar">?</div>
  </div>
</nav>

<div class="main-wrap">
  <div class="page-header">
    <div>
      <h1 class="page-title">NOTIFICATIONS</h1>
      <p class="page-sub" id="notifCount">Chargement…</p>
    </div>
    <button class="btn-mark-read" onclick="markAllRead()">Tout marquer lu</button>
  </div>
  <div id="notifList"></div>
</div>

<script src="frontend/js/api.js"></script>
<script src="frontend/js/auth.js"></script>
<script>
AUTH.requireAuth();
const _user = AUTH.getUser();
document.getElementById('navAvatar').textContent = (_user?.full_name?.split(' ').map(w=>w[0]).join('').slice(0,2)||'U').toUpperCase();

// Build notifications from activity data (messages + service requests)
async function loadNotifications() {
  const list = document.getElementById('notifList');
  const countEl = document.getElementById('notifCount');

  try {
    const [reqsData, msgsData] = await Promise.all([
      api.services.myRequests({ limit: 10 }),
      api.messages.conversations().catch(() => ({ conversations: [] }))
    ]);

    const reqs = reqsData.requests || reqsData;
    const convs = msgsData.conversations || msgsData || [];

    const notifs = [];

    // Status-change notifications from requests
    reqs.forEach(r => {
      if (r.status === 'accepted') {
        notifs.push({ icon: '<i data-lucide="check-circle"></i>', title: 'Demande acceptée', text: `${r.provider_name || 'Un prestataire'} a accepté votre demande "${r.title}"`, time: r.updated_at || r.created_at, unread: true, link: 'mes-demandes.html' });
      } else if (r.status === 'completed') {
        notifs.push({ icon: '<i data-lucide="check-circle-2"></i>', title: 'Prestation terminée', text: `La prestation "${r.title}" est terminée. Pensez à laisser un avis !`, time: r.updated_at || r.created_at, unread: false, link: `provider-profile.html?id=${r.provider_id}` });
      } else if (r.status === 'rejected') {
        notifs.push({ icon: '<i data-lucide="x-circle"></i>', title: 'Demande refusée', text: `Votre demande "${r.title}" a été refusée. Cherchez un autre prestataire.`, time: r.updated_at || r.created_at, unread: true, link: 'prestataires.html' });
      } else {
        notifs.push({ icon: '<i data-lucide="clipboard-list"></i>', title: 'Demande envoyée', text: `Votre demande "${r.title}" a été transmise. En attente de confirmation.`, time: r.created_at, unread: false, link: 'mes-demandes.html' });
      }
    });

    // Message notifications
    convs.slice(0, 3).forEach(c => {
      notifs.push({ icon: '<i data-lucide="message-circle"></i>', title: 'Nouveau message', text: `Message de ${c.other_name || c.other_user_name || 'un prestataire'}`, time: c.last_message_at || c.created_at, unread: true, link: `messages.html?user=${c.partner_id || c.other_user_id || ''}` });
    });

    // Sort by time descending
    notifs.sort((a, b) => new Date(b.time) - new Date(a.time));

    const unreadCount = notifs.filter(n => n.unread).length;
    countEl.textContent = `${notifs.length} notification(s)${unreadCount ? ` · ${unreadCount} non lue(s)` : ''}`;

    if (!notifs.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-state-icon"><i data-lucide="bell"></i></div><h2>Tout est calme</h2><p>Vous n'avez aucune notification pour le moment.</p></div>`;
      lucide.createIcons();
      return;
    }

    list.innerHTML = `<div class="notif-list">${notifs.map((n, i) => {
      const time = n.time ? new Date(n.time).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
      return `
        <div class="notif-item ${n.unread ? 'unread' : 'read'}" onclick="window.location.href='${n.link || '#'}'">
          <div class="notif-icon">${n.icon}</div>
          <div class="notif-body">
            <div class="notif-title">${n.title}</div>
            <div class="notif-text">${n.text}</div>
            <div class="notif-time">${time}</div>
          </div>
        </div>
      `;
    }).join('')}</div>`;
    lucide.createIcons();
  } catch (err) {
    list.innerHTML = `<p style="color:var(--accent2);font-size:.85rem;">${err.message}</p>`;
  }
}

function markAllRead() {
  document.querySelectorAll('.notif-item.unread').forEach(el => {
    el.classList.remove('unread'); el.classList.add('read');
  });
  document.getElementById('notifCount').textContent = 'Toutes les notifications lues';
}

loadNotifications();
</script>
</body>
</html>
