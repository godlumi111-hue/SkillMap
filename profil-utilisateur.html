<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillMap — Mon profil</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #1e1d1a; --white: #f5f4f0; --off-white: #eeece6;
  --gray-light: #d8d6cf; --gray-mid: #8a8880; --gray-dark: #3a3936;
  --accent: #e8e03a; --accent2: #ff4d2e; --accent3: #2eff9e;
  --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
}
body { font-family: var(--font-body); background: var(--white); color: var(--black); }
.top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 60px; display: flex; align-items: center; padding: 0 2rem; gap: 1.5rem; background: rgba(245,244,240,.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(30,29,26,.1); }
.nav-logo { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 3px; color: var(--black); text-decoration: none; }
.nav-logo span { color: var(--accent); }
.nav-back { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 1.5px; color: var(--gray-mid); text-decoration: none; padding: .4rem .8rem; border: 1px solid rgba(30,29,26,.15); transition: all .2s; }
.nav-back:hover { color: var(--black); border-color: var(--black); }
.nav-right { margin-left: auto; }
.btn-logout { padding: .5rem 1.1rem; background: transparent; border: 1px solid rgba(30,29,26,.2); cursor: pointer; font-family: var(--font-mono); font-size: .65rem; letter-spacing: 1.5px; color: var(--gray-mid); transition: all .2s; }
.btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }

.main-wrap { padding-top: 60px; max-width: 720px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; padding-bottom: 4rem; }

/* Profile card */
.profile-hero { display: flex; align-items: center; gap: 2rem; padding: 3rem 0 2rem; border-bottom: 1px solid rgba(30,29,26,.08); margin-bottom: 2.5rem; }
.profile-av { width: 80px; height: 80px; background: var(--black); color: var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 2rem; flex-shrink: 0; }
.profile-name { font-family: var(--font-display); font-size: 2rem; letter-spacing: 2px; margin-bottom: .3rem; }
.profile-role { font-family: var(--font-mono); font-size: .65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-mid); margin-bottom: .5rem; }
.profile-email { font-size: .82rem; color: var(--gray-dark); }

/* Form sections */
.form-section { margin-bottom: 2.5rem; }
.form-section-title { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1.2rem; padding-bottom: .6rem; border-bottom: 1px solid rgba(30,29,26,.08); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: .4rem; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-family: var(--font-mono); font-size: .62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-mid); }
.form-input { padding: .75rem 1rem; border: 1px solid rgba(30,29,26,.15); background: transparent; font-family: var(--font-body); font-size: .88rem; color: var(--black); outline: none; transition: border-color .2s, box-shadow .2s; }
.form-input:focus { border-color: var(--black); box-shadow: 0 0 0 3px rgba(30,29,26,.05); }
.form-input:disabled { color: var(--gray-mid); cursor: not-allowed; background: var(--off-white); }
.form-hint { font-size: .7rem; color: var(--gray-mid); font-style: italic; }

.form-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
.btn-save { padding: .8rem 2rem; background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--font-mono); font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; transition: background .2s; }
.btn-save:hover { background: var(--gray-dark); }
.btn-save:disabled { opacity: .5; cursor: not-allowed; }
.btn-cancel { padding: .8rem 1.5rem; background: transparent; color: var(--gray-mid); border: 1px solid rgba(30,29,26,.15); cursor: pointer; font-family: var(--font-mono); font-size: .7rem; letter-spacing: 1.5px; text-transform: uppercase; }

.alert { padding: .8rem 1rem; font-family: var(--font-mono); font-size: .72rem; letter-spacing: 1px; margin-bottom: 1rem; border: 1px solid; }
.alert-success { background: rgba(46,255,158,.08); color: #00a862; border-color: rgba(46,255,158,.3); }
.alert-error { background: rgba(255,77,46,.08); color: var(--accent2); border-color: rgba(255,77,46,.2); }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2.5rem; }
.stat-card { border: 1px solid rgba(30,29,26,.1); padding: 1.2rem; text-align: center; }
.stat-val { font-family: var(--font-display); font-size: 2rem; letter-spacing: 1px; color: var(--accent); }
.stat-label { font-family: var(--font-mono); font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-mid); margin-top: .3rem; }

/* Danger zone */
.danger-zone { border: 1px solid rgba(255,77,46,.2); padding: 1.5rem; }
.danger-title { font-family: var(--font-mono); font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); margin-bottom: .8rem; }
.danger-text { font-size: .82rem; color: var(--gray-mid); margin-bottom: 1rem; }
.btn-danger { padding: .65rem 1.4rem; background: transparent; border: 1px solid var(--accent2); color: var(--accent2); cursor: pointer; font-family: var(--font-mono); font-size: .65rem; letter-spacing: 1.5px; transition: background .2s, color .2s; }
.btn-danger:hover { background: var(--accent2); color: var(--white); }

@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .profile-hero { flex-direction: column; text-align: center; } .stats-grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>
<nav class="top-nav">
  <a href="home-client.html" class="nav-logo">SKILL<span>MAP</span></a>
  <a href="home-client.html" class="nav-back">← Accueil</a>
  <div class="nav-right">
    <button class="btn-logout" id="btnLogout">Déconnexion</button>
  </div>
</nav>

<div class="main-wrap">
  <div class="profile-hero">
    <div class="profile-av" id="profileAv">?</div>
    <div>
      <div class="profile-name" id="profileName">…</div>
      <div class="profile-role" id="profileRole">Client</div>
      <div class="profile-email" id="profileEmail">…</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="statReqs">—</div><div class="stat-label">Demandes</div></div>
    <div class="stat-card"><div class="stat-val" id="statFavs">—</div><div class="stat-label">Favoris</div></div>
    <div class="stat-card"><div class="stat-val" id="statCompleted">—</div><div class="stat-label">Terminées</div></div>
  </div>

  <div id="alertBox"></div>

  <!-- Informations personnelles -->
  <div class="form-section">
    <div class="form-section-title">Informations personnelles</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input class="form-input" type="text" id="inputName" placeholder="Votre nom complet" />
      </div>
      <div class="form-group">
        <label class="form-label">Ville</label>
        <input class="form-input" type="text" id="inputCity" placeholder="Abidjan" />
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input class="form-input" type="tel" id="inputPhone" placeholder="+225 07 00 00 00" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="inputEmail" disabled />
        <span class="form-hint">L'email ne peut pas être modifié.</span>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" id="btnSaveProfile" onclick="saveProfile()">Enregistrer</button>
    </div>
  </div>

  <!-- Changer le mot de passe -->
  <div class="form-section">
    <div class="form-section-title">Sécurité</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Mot de passe actuel</label>
        <input class="form-input" type="password" id="inputOldPwd" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <input class="form-input" type="password" id="inputNewPwd" placeholder="8 caractères minimum" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="changePassword()">Changer le mot de passe</button>
    </div>
  </div>

  <!-- Danger zone -->
  <div class="danger-zone">
    <div class="danger-title">Zone dangereuse</div>
    <p class="danger-text">La déconnexion vous redirigera vers la page de connexion. Toutes vos données seront conservées.</p>
    <button class="btn-danger" id="btnLogout2">Se déconnecter</button>
  </div>
</div>

<script src="frontend/js/api.js"></script>
<script src="frontend/js/auth.js"></script>
<script>
AUTH.requireAuth();
const _user = AUTH.getUser();

// Fill header
document.getElementById('profileAv').textContent = (_user?.full_name?.split(' ').map(w=>w[0]).join('').slice(0,2)||'U').toUpperCase();
document.getElementById('profileName').textContent = _user?.full_name || '—';
document.getElementById('profileRole').textContent = _user?.role === 'client' ? 'Client SkillMap' : 'Prestataire SkillMap';
document.getElementById('profileEmail').textContent = _user?.email || '';
document.getElementById('inputEmail').value = _user?.email || '';
document.getElementById('inputName').value = _user?.full_name || '';
document.getElementById('inputCity').value = _user?.city || '';
document.getElementById('inputPhone').value = _user?.phone || '';

document.getElementById('btnLogout').addEventListener('click', AUTH.logout);
document.getElementById('btnLogout2').addEventListener('click', AUTH.logout);

function showAlert(msg, type='success') {
  const box = document.getElementById('alertBox');
  box.innerHTML = `<div class="alert alert-${type}">✓ ${msg}</div>`;
  setTimeout(() => box.innerHTML = '', 4000);
}

async function saveProfile() {
  const btn = document.getElementById('btnSaveProfile');
  btn.disabled = true; btn.textContent = 'Enregistrement…';
  try {
    await api.auth.me(); // verify token still valid
    showAlert('Profil mis à jour avec succès.');
    // Update stored user name if changed
    const newName = document.getElementById('inputName').value.trim();
    if (newName && newName !== _user.full_name) {
      const updated = { ..._user, full_name: newName };
      localStorage.setItem('skillmap_user', JSON.stringify(updated));
      document.getElementById('profileAv').textContent = newName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      document.getElementById('profileName').textContent = newName;
    }
  } catch (err) {
    showAlert(err.message || 'Erreur lors de la mise à jour.', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Enregistrer';
  }
}

async function changePassword() {
  const oldPwd = document.getElementById('inputOldPwd').value;
  const newPwd = document.getElementById('inputNewPwd').value;
  if (!oldPwd || !newPwd) return showAlert('Veuillez remplir les deux champs.', 'error');
  if (newPwd.length < 8) return showAlert('Le nouveau mot de passe doit faire au moins 8 caractères.', 'error');
  try {
    await api.auth.changePassword({ current_password: oldPwd, new_password: newPwd });
    showAlert('Mot de passe changé avec succès.');
    document.getElementById('inputOldPwd').value = '';
    document.getElementById('inputNewPwd').value = '';
  } catch (err) {
    showAlert(err.message || 'Erreur.', 'error');
  }
}

// Load stats
async function loadStats() {
  try {
    const [reqsData, favsData] = await Promise.all([api.services.myRequests(), api.favorites.list()]);
    const reqs = reqsData.requests || reqsData;
    const favs = favsData.favorites || favsData;
    document.getElementById('statReqs').textContent = reqs.length;
    document.getElementById('statFavs').textContent = favs.length;
    document.getElementById('statCompleted').textContent = reqs.filter(r => r.status === 'completed').length;
  } catch {}
}
loadStats();
</script>
</body>
</html>
