<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillMap — Tous les prestataires</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="frontend/css/responsive.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #1e1d1a; --white: #f5f4f0; --off-white: #eeece6;
  --gray-light: #d8d6cf; --gray-mid: #8a8880; --gray-dark: #3a3936;
  --accent: #e8e03a; --accent2: #ff4d2e; --accent3: #2eff9e;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--white); color: var(--black); }

/* NAV */
.top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 60px; display: flex; align-items: center; padding: 0 2rem; gap: 1.5rem; background: rgba(245,244,240,.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(30,29,26,.1); }
.nav-logo { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 3px; color: var(--black); text-decoration: none; }
.nav-logo span { color: var(--accent); }
.nav-search-wrap { flex: 1; max-width: 380px; display: flex; border: 1px solid rgba(30,29,26,.18); background: var(--white); }
.nav-search-input { flex: 1; padding: .5rem .9rem; font-family: var(--font-body); font-size: .85rem; color: var(--black); border: none; outline: none; background: transparent; }
.nav-search-input::placeholder { color: var(--gray-mid); }
.nav-search-btn { padding: .5rem .9rem; background: var(--black); border: none; cursor: pointer; color: var(--white); font-size: .8rem; }
.nav-right { margin-left: auto; display: flex; gap: 1rem; align-items: center; }
.nav-link { font-family: var(--font-mono); font-size: .65rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-mid); text-decoration: none; transition: color .2s; }
.nav-link:hover { color: var(--black); }
.nav-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--black); color: var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: .9rem; cursor: pointer; }

/* LAYOUT */
.main-wrap { padding-top: 60px; display: flex; min-height: 100vh; }

/* FILTERS SIDEBAR */
.filters-sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid rgba(30,29,26,.1); padding: 2rem 1.4rem; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
.filter-section { margin-bottom: 1.8rem; }
.filter-section-title { font-family: var(--font-mono); font-size: .62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-mid); margin-bottom: .8rem; }
.filter-btn { display: block; width: 100%; padding: .5rem .7rem; margin-bottom: .3rem; text-align: left; border: 1px solid transparent; cursor: pointer; font-family: var(--font-body); font-size: .82rem; color: var(--gray-dark); background: transparent; transition: background .15s, border-color .15s; }
.filter-btn:hover { background: var(--off-white); }
.filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
.filter-input { width: 100%; padding: .5rem .7rem; border: 1px solid rgba(30,29,26,.15); background: transparent; font-family: var(--font-body); font-size: .82rem; color: var(--black); outline: none; }
.filter-input:focus { border-color: var(--black); }
.filter-range { width: 100%; accent-color: var(--black); }
.filter-val-display { font-family: var(--font-mono); font-size: .65rem; color: var(--black); margin-top: .3rem; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: .4rem 0; }
.toggle-label { font-size: .82rem; color: var(--gray-dark); }
.toggle-sw { width: 36px; height: 20px; background: var(--gray-light); border-radius: 10px; position: relative; cursor: pointer; transition: background .2s; }
.toggle-sw.on { background: var(--accent3); }
.toggle-knob { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--white); transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle-sw.on .toggle-knob { left: 19px; }
.btn-reset { width: 100%; padding: .6rem; background: transparent; border: 1px solid rgba(30,29,26,.15); cursor: pointer; font-family: var(--font-mono); font-size: .62rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-mid); margin-top: 1rem; transition: all .2s; }
.btn-reset:hover { border-color: var(--black); color: var(--black); }

/* CONTENT */
.content-area { flex: 1; padding: 2rem 2.5rem; }
.content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
.content-count { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-mid); }
.content-count span { color: var(--black); font-size: 1rem; }
.sort-select { padding: .45rem .9rem; border: 1px solid rgba(30,29,26,.15); background: transparent; font-family: var(--font-mono); font-size: .65rem; letter-spacing: 1px; color: var(--gray-mid); cursor: pointer; outline: none; }

/* Provider grid */
.providers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1px; background: rgba(30,29,26,.08); }
.prov-card { background: var(--white); padding: 1.4rem; cursor: pointer; transition: background .15s; position: relative; display: flex; flex-direction: column; gap: .9rem; }
.prov-card:hover { background: rgba(232,224,58,.03); }
.prov-card-top { display: flex; align-items: flex-start; gap: 1rem; }
.prov-av { width: 50px; height: 50px; flex-shrink: 0; background: rgba(232,224,58,.1); color: var(--accent); border: 1px solid rgba(232,224,58,.2); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.1rem; }
.prov-name { font-size: .9rem; font-weight: 500; }
.prov-title { font-family: var(--font-mono); font-size: .65rem; letter-spacing: 1px; color: var(--gray-mid); margin-top: .15rem; }
.prov-loc { font-size: .7rem; color: var(--gray-mid); margin-top: .15rem; }
.prov-badges { display: flex; gap: .35rem; flex-wrap: wrap; }
.badge { font-size: .58rem; font-family: var(--font-mono); letter-spacing: 1px; padding: .22rem .55rem; border: 1px solid; }
.badge-avail { color: var(--accent3); border-color: rgba(46,255,158,.3); background: rgba(46,255,158,.05); }
.badge-busy { color: var(--gray-mid); border-color: rgba(30,29,26,.15); }
.badge-verified { color: var(--accent); border-color: rgba(232,224,58,.3); background: rgba(232,224,58,.05); }
.prov-footer { display: flex; align-items: center; gap: .8rem; margin-top: auto; }
.prov-stars { color: var(--accent); font-size: .8rem; }
.prov-rate { font-family: var(--font-mono); font-size: .65rem; color: var(--gray-mid); }
.prov-price { font-family: var(--font-mono); font-size: .65rem; color: var(--gray-mid); margin-left: auto; }
.prov-dist { font-family: var(--font-mono); font-size: .62rem; color: var(--accent3); }

/* Pagination */
.pagination { display: flex; gap: .4rem; justify-content: center; margin-top: 2rem; padding-bottom: 2rem; }
.page-btn { width: 36px; height: 36px; border: 1px solid rgba(30,29,26,.15); background: transparent; cursor: pointer; font-family: var(--font-mono); font-size: .72rem; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s; }
.page-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
.page-btn:hover:not(.active) { border-color: var(--black); }

.skeleton { background: linear-gradient(90deg, var(--gray-light) 25%, var(--off-white) 50%, var(--gray-light) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }

@media (max-width: 700px) { .filters-sidebar { display: none; } .content-area { padding: 1.5rem 1rem; } }
</style>
</head>
<body>
<nav class="top-nav">
  <a href="home-client.html" class="nav-logo">SKILL<span>MAP</span></a>
  <div class="nav-search-wrap">
    <input class="nav-search-input" id="mainSearch" type="text" placeholder="Plombier, designer, mécanicien…" onkeydown="if(event.key==='Enter') loadProviders()" />
    <button class="nav-search-btn" onclick="loadProviders()"><i data-lucide="search"></i></button>
  </div>
  <div class="nav-right">
    <a href="home-client.html" class="nav-link">Accueil</a>
    <div class="nav-avatar" id="navAvatar" onclick="window.location.href='profil-utilisateur.html'">?</div>
  </div>
</nav>

<div class="main-wrap">
  <!-- FILTERS -->
  <aside class="filters-sidebar">
    <div class="filter-section">
      <div class="filter-section-title">Catégorie</div>
      <button class="filter-btn active" data-cat="" onclick="setCat('',this)">Toutes</button>
      <!-- Populated by JS -->
      <div id="catFilters"></div>
    </div>

    <div class="filter-section">
      <div class="filter-section-title">Distance max</div>
      <input type="range" class="filter-range" id="distFilter" min="1" max="25" value="20" oninput="document.getElementById('distVal').textContent=this.value+' km'" onchange="loadProviders()" />
      <div class="filter-val-display" id="distVal">20 km</div>
    </div>

    <div class="filter-section">
      <div class="filter-section-title">Disponibilité</div>
      <div class="toggle-row">
        <span class="toggle-label">Disponibles uniquement</span>
        <div class="toggle-sw" id="availFilter" onclick="this.classList.toggle('on');loadProviders()"></div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-section-title">Note minimale</div>
      <button class="filter-btn" data-rating="" onclick="setRating('',this)">Toutes</button>
      <button class="filter-btn" data-rating="4" onclick="setRating('4',this)">★★★★ 4+ étoiles</button>
      <button class="filter-btn" data-rating="4.5" onclick="setRating('4.5',this)">★★★★★ 4.5+</button>
    </div>

    <div class="filter-section">
      <div class="filter-section-title">Expérience</div>
      <button class="filter-btn active" data-exp="" onclick="setExp('',this)">Tous niveaux</button>
      <button class="filter-btn" data-exp="2" onclick="setExp('2',this)">2+ ans</button>
      <button class="filter-btn" data-exp="5" onclick="setExp('5',this)">5+ ans</button>
      <button class="filter-btn" data-exp="10" onclick="setExp('10',this)">10+ ans</button>
    </div>

    <button class="btn-reset" onclick="resetFilters()">Réinitialiser les filtres</button>
  </aside>

  <!-- CONTENT -->
  <div class="content-area">
    <!-- Bouton filtres mobile -->
    <button class="mobile-filter-btn" id="mobileFilterBtn" onclick="toggleMobileFilters()">
      <i data-lucide="sliders-horizontal"></i> Filtres
    </button>
    <div class="content-header">
      <div class="content-count"><span id="countNum">—</span> prestataires trouvés</div>
      <select class="sort-select" id="sortSelect" onchange="loadProviders()">
        <option value="distance">Trier : Plus proche</option>
        <option value="rating">Trier : Mieux notés</option>
        <option value="recent">Trier : Plus récents</option>
      </select>
    </div>
    <div class="providers-grid" id="providerGrid">
      ${[1,2,3,4,5,6].map(()=>`<div class="skeleton" style="height:180px;"></div>`).join('')}
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="frontend/js/api.js"></script>
<script src="frontend/js/auth.js"></script>
<script>
AUTH.requireAuth();
const _user = AUTH.getUser();
document.getElementById('navAvatar').textContent = (_user?.full_name?.split(' ').map(w=>w[0]).join('').slice(0,2)||'U').toUpperCase();

let _lat = null, _lng = null;
let _activeCat = '';
let _minRating = '';
let _minExp = '';
let _page = 1;
const _limit = 18;

// Read URL params
const _urlParams = new URLSearchParams(window.location.search);
const _urlQ = _urlParams.get('q') || '';
const _urlCat = _urlParams.get('category') || '';
if (_urlQ) document.getElementById('mainSearch').value = _urlQ;
if (_urlCat) { _activeCat = _urlCat; }

const CAT_ICONS = {
  artisanat: 'wrench', electricite: 'zap', plomberie: 'droplets',
  beaute: 'scissors', design: 'palette', education: 'book-open',
  telephonie: 'smartphone', mecanique: 'car', couture: 'shirt',
  cuisine: 'utensils',
};

async function loadCategories() {
  try {
    const { categories } = await api.categories.list();
    const filtersEl = document.getElementById('catFilters');
    filtersEl.innerHTML = categories.map(c => `
      <button class="filter-btn${c.slug === _activeCat ? ' active' : ''}" data-cat="${c.slug}" onclick="setCat('${c.slug}',this)">
        ${CAT_ICONS[c.slug] ? `<i data-lucide="${CAT_ICONS[c.slug]}"></i>` : ''} ${c.name}
      </button>
    `).join('');
    if (_activeCat) {
      document.querySelector('.filter-btn[data-cat=""]')?.classList.remove('active');
    }
    lucide.createIcons({ el: filtersEl });
  } catch {}
}

function setCat(cat, btn) {
  _activeCat = cat; _page = 1;
  document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadProviders();
}
function setRating(r, btn) {
  _minRating = r; _page = 1;
  document.querySelectorAll('.filter-btn[data-rating]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadProviders();
}
function setExp(e, btn) {
  _minExp = e; _page = 1;
  document.querySelectorAll('.filter-btn[data-exp]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadProviders();
}

function resetFilters() {
  _activeCat = ''; _minRating = ''; _minExp = ''; _page = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-cat=""]')?.classList.add('active');
  document.querySelector('.filter-btn[data-exp=""]')?.classList.add('active');
  document.getElementById('availFilter')?.classList.remove('on');
  document.getElementById('distFilter').value = 20;
  document.getElementById('distVal').textContent = '20 km';
  document.getElementById('mainSearch').value = '';
  loadProviders();
}

async function loadProviders() {
  const grid = document.getElementById('providerGrid');
  grid.innerHTML = [1,2,3,4,5,6].map(()=>`<div class="skeleton" style="height:180px;"></div>`).join('');

  const q = document.getElementById('mainSearch').value.trim();
  const sort = document.getElementById('sortSelect').value;
  const avail = document.getElementById('availFilter')?.classList.contains('on');
  const dist = document.getElementById('distFilter').value;

  const params = { limit: _limit, page: _page, sort };
  if (q) params.q = q;
  if (_activeCat) params.category = _activeCat;
  if (avail) params.available = 'true';
  if (_lat) { params.lat = _lat; params.lng = _lng; params.radius = dist; }

  try {
    const data = await api.providers.list(params);
    let providers = data.providers || [];

    // Client-side filtering (rating, exp) since API may not support
    if (_minRating) providers = providers.filter(p => (p.avg_rating || 0) >= parseFloat(_minRating));
    if (_minExp) providers = providers.filter(p => (p.experience_years || 0) >= parseInt(_minExp));

    document.getElementById('countNum').textContent = data.total || providers.length;
    renderGrid(providers);
    renderPagination(data.pages || 1);
  } catch (err) {
    grid.innerHTML = `<div style="padding:3rem;color:var(--accent2);font-size:.85rem;grid-column:1/-1;">${err.message}</div>`;
  }
}

function renderGrid(providers) {
  const grid = document.getElementById('providerGrid');
  if (!providers.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1;padding:4rem 2rem;text-align:center;">
        <div style="font-size:2.5rem;margin-bottom:1rem;"><i data-lucide="search"></i></div>
        <div style="font-family:var(--font-display);font-size:1.8rem;letter-spacing:2px;margin-bottom:.6rem;">AUCUN RÉSULTAT</div>
        <p style="color:var(--gray-mid);font-size:.85rem;">Essayez d'élargir vos filtres ou de modifier votre recherche.</p>
      </div>`;
    return;
  }

  grid.innerHTML = providers.map(p => {
    const initials = (p.full_name||'??').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const stars = p.avg_rating ? '★'.repeat(Math.round(p.avg_rating))+'☆'.repeat(5-Math.round(p.avg_rating)) : '';
    return `
      <div class="prov-card" onclick="openProfile(${p.id})">
        <div class="prov-card-top">
          <div class="prov-av">${initials}</div>
          <div>
            <div class="prov-name">${p.full_name}</div>
            <div class="prov-title">${p.title}</div>
            <div class="prov-loc"><i data-lucide="map-pin"></i> ${p.neighborhood || p.city}</div>
          </div>
        </div>
        <div class="prov-badges">
          ${p.is_available ? '<span class="badge badge-avail">● DISPONIBLE</span>' : '<span class="badge badge-busy">● OCCUPÉ</span>'}
          ${p.is_verified ? '<span class="badge badge-verified"><i data-lucide="shield-check"></i> VÉRIFIÉ</span>' : ''}
        </div>
        ${p.description ? `<p style="font-size:.78rem;color:var(--gray-dark);line-height:1.55;font-weight:300;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${p.description}</p>` : ''}
        <div class="prov-footer">
          ${stars ? `<span class="prov-stars">${stars}</span><span class="prov-rate">${p.avg_rating}/5 (${p.review_count})</span>` : ''}
          ${p.distance_km != null ? `<span class="prov-dist"><i data-lucide="map-pin"></i> ${p.distance_km} km</span>` : ''}
          ${p.hourly_rate ? `<span class="prov-price">${(p.hourly_rate).toLocaleString('fr-FR')} FCFA/h</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
  lucide.createIcons();
}

function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = Array.from({length: Math.min(totalPages, 8)}, (_,i) => i+1).map(n =>
    `<button class="page-btn${n===_page?' active':''}" onclick="goPage(${n})">${n}</button>`
  ).join('');
}

function goPage(n) { _page = n; loadProviders(); window.scrollTo(0,0); }

function openProfile(id) {
  window.location.href = `provider-profile.html?id=${id}&from=prestataires.html`;
}

function initGeo() {
  if (!navigator.geolocation) { loadProviders(); return; }
  navigator.geolocation.getCurrentPosition(
    pos => { _lat = pos.coords.latitude; _lng = pos.coords.longitude; loadProviders(); },
    () => { _lat = 5.3364; _lng = -4.0267; loadProviders(); },
    { timeout: 4000 }
  );
}

loadCategories();
initGeo();
lucide.createIcons();

function toggleMobileFilters() {
  const sidebar = document.querySelector('.filters-sidebar');
  const btn = document.getElementById('mobileFilterBtn');
  sidebar.classList.toggle('open');
  btn.textContent = sidebar.classList.contains('open') ? '✕ Fermer les filtres' : '⊞ Filtres';
  lucide.createIcons({ el: btn });
}
</script>

<!-- Bottom Navigation (mobile) -->
<nav class="bottom-nav">
  <a href="home-client.html" class="bottom-nav-item">
    <i data-lucide="home"></i><span>Accueil</span>
  </a>
  <a href="prestataires.html" class="bottom-nav-item active">
    <i data-lucide="search"></i><span>Chercher</span>
  </a>
  <a href="rendez-vous.html" class="bottom-nav-item">
    <i data-lucide="calendar-days"></i><span>Rendez-vous</span>
  </a>
  <a href="profil-utilisateur.html" class="bottom-nav-item">
    <i data-lucide="user"></i><span>Profil</span>
  </a>
</nav>
<script>if(window.lucide)lucide.createIcons({el:document.querySelector('.bottom-nav')});</script>
</body>
</html>
