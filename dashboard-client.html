<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillMap — Recherche</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="frontend/css/responsive.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #1e1d1a; --white: #f5f4f0; --off-white: #eeece6;
    --gray-light: #d8d6cf; --gray-mid: #8a8880; --gray-dark: #3a3936;
    --accent: #e8e03a; --accent2: #ff4d2e; --accent3: #2eff9e;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--font-body); background: var(--white); color: var(--black); }

  .cursor { position: fixed; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .2s, height .2s; mix-blend-mode: multiply; }
  .cursor-ring { position: fixed; width: 40px; height: 40px; border: 1px solid rgba(232,224,58,.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width .3s, height .3s; }

  /* ── TOP NAV ── */
  .top-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: 60px; display: flex; align-items: center;
    padding: 0 1.5rem; gap: 1.2rem;
    background: rgba(245,244,240,.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(30,29,26,.1);
  }
  .nav-logo { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 3px; color: var(--black); text-decoration: none; flex-shrink: 0; }
  .nav-logo span { color: var(--accent); }
  .nav-search-wrap { flex: 1; max-width: 420px; display: flex; align-items: center; border: 1px solid rgba(30,29,26,.18); background: var(--white); transition: border-color .2s, box-shadow .2s; }
  .nav-search-wrap:focus-within { border-color: var(--black); box-shadow: 0 0 0 3px rgba(30,29,26,.05); }
  .nav-search-input { flex: 1; padding: .55rem .9rem; font-family: var(--font-body); font-size: .85rem; color: var(--black); border: none; outline: none; background: transparent; }
  .nav-search-input::placeholder { color: var(--gray-mid); }
  .nav-search-btn { padding: .55rem .9rem; background: var(--black); border: none; cursor: pointer; color: var(--white); font-size: .8rem; transition: background .2s; }
  .nav-search-btn:hover { background: var(--gray-dark); }
  .nav-loc { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 1px; color: var(--gray-mid); padding: 0 .8rem; border-left: 1px solid rgba(30,29,26,.1); white-space: nowrap; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
  .nav-notif { width: 36px; height: 36px; border: 1px solid rgba(30,29,26,.15); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; transition: border-color .2s, background .2s; position: relative; }
  .nav-notif:hover { border-color: var(--black); }
  .notif-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); border: 2px solid var(--white); }
  .nav-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--black); color: var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: .9rem; cursor: pointer; border: 2px solid transparent; transition: border-color .2s; }
  .nav-avatar:hover { border-color: var(--accent); }

  /* ── APP LAYOUT ── */
  .app-layout { display: flex; height: 100vh; padding-top: 60px; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 340px; flex-shrink: 0;
    border-right: 1px solid rgba(30,29,26,.1);
    display: flex; flex-direction: column;
    overflow: hidden; background: var(--white);
  }
  .sidebar-header { padding: 1.2rem 1.4rem; border-bottom: 1px solid rgba(30,29,26,.08); flex-shrink: 0; }
  .sidebar-count { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-mid); margin-bottom: .8rem; }
  .sidebar-count span { color: var(--black); font-weight: 500; }

  .cats-wrap { display: flex; gap: .4rem; flex-wrap: wrap; }
  .cat-pill { padding: .3rem .8rem; border: 1px solid var(--gray-light); font-size: .7rem; letter-spacing: 1px; cursor: pointer; transition: background .15s, color .15s, border-color .15s, transform .1s; color: var(--gray-dark); font-family: var(--font-body); background: transparent; }
  .cat-pill:hover { border-color: var(--black); }
  .cat-pill.active { background: var(--black); color: var(--white); border-color: var(--black); }
  .cat-pill:active { transform: scale(.93); }

  .sidebar-filters { padding: .9rem 1.4rem; border-bottom: 1px solid rgba(30,29,26,.08); flex-shrink: 0; }
  .filter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; }
  .filter-label { font-size: .68rem; font-family: var(--font-mono); letter-spacing: 1.5px; text-transform: uppercase; color: var(--gray-mid); }
  .filter-val { font-size: .75rem; font-weight: 500; font-family: var(--font-mono); color: var(--black); }
  .range-track { width: 100%; height: 3px; background: var(--gray-light); position: relative; margin-bottom: .8rem; cursor: pointer; }
  .range-fill { height: 100%; background: var(--black); width: 45%; }
  .range-thumb { position: absolute; top: 50%; right: 55%; transform: translate(50%,-50%); width: 14px; height: 14px; border-radius: 50%; background: var(--black); border: 2px solid var(--white); box-shadow: 0 1px 4px rgba(0,0,0,.2); cursor: grab; }

  .avail-toggle { display: flex; align-items: center; justify-content: space-between; }
  .toggle-switch { width: 36px; height: 20px; background: var(--accent3); border-radius: 10px; position: relative; cursor: pointer; transition: background .2s; }
  .toggle-switch.off { background: var(--gray-light); }
  .toggle-knob { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--white); transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .toggle-switch:not(.off) .toggle-knob { left: 19px; }

  .sidebar-list { flex: 1; overflow-y: auto; padding: .8rem; }
  .sidebar-list::-webkit-scrollbar { width: 3px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--gray-light); }

  /* Provider compact card */
  .pcard {
    display: flex; gap: .9rem; padding: .9rem 1rem;
    border: 1px solid rgba(30,29,26,.08); margin-bottom: .5rem;
    cursor: pointer; transition: border-color .2s, transform .2s, box-shadow .2s;
    position: relative; background: var(--white); overflow: hidden;
    text-decoration: none; color: inherit;
  }
  .pcard::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0; background: var(--accent); transition: height .3s cubic-bezier(.22,1,.36,1); }
  .pcard:hover { border-color: rgba(30,29,26,.2); transform: translateX(3px); box-shadow: 3px 3px 12px rgba(0,0,0,.06); }
  .pcard:hover::before { height: 100%; }
  .pcard.active { border-color: var(--accent); background: rgba(232,224,58,.06); }
  .pcard.active::before { height: 100%; }
  .pcard-av { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1rem; flex-shrink: 0; }
  .pcard-body { flex: 1; min-width: 0; }
  .pcard-name { font-size: .88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pcard-role { font-size: .68rem; font-family: var(--font-mono); color: var(--gray-mid); letter-spacing: 1px; margin-top: 2px; }
  .pcard-meta { display: flex; align-items: center; gap: .6rem; margin-top: .4rem; }
  .pcard-dist { font-size: .67rem; font-family: var(--font-mono); color: var(--gray-mid); }
  .pcard-rating { font-size: .72rem; color: var(--accent); font-weight: 500; }
  .pcard-badge { font-size: .58rem; letter-spacing: 1.5px; text-transform: uppercase; font-family: var(--font-mono); padding: .18rem .5rem; background: rgba(46,255,158,.12); color: #1ab86e; border: 1px solid rgba(46,255,158,.3); }
  .pcard-badge.busy { background: rgba(30,29,26,.06); color: var(--gray-mid); border-color: rgba(30,29,26,.12); }

  /* ── MAP AREA ── */
  .map-area { flex: 1; position: relative; overflow: hidden; background: #ccc9bf; }

  /* ── RESPONSIVE MOBILE ── */
  @media (max-width: 768px) {
    html, body { overflow: auto; }
    .top-nav { height: 52px; padding: 0 1rem; }
    .nav-logo { font-size: 1.3rem; }
    .nav-loc { display: none; }
    .app-layout {
      flex-direction: column;
      height: auto;
      padding-top: 52px;
      overflow: visible;
    }
    .sidebar {
      width: 100%;
      height: 50vh;
      max-height: 50vh;
      border-right: none;
      border-bottom: 1px solid rgba(30,29,26,.1);
      flex-shrink: 0;
    }
    .map-area {
      height: 50vh;
      flex: none;
    }
    .provider-popup {
      width: calc(100% - 2rem) !important;
      left: 1rem !important;
      transform: none !important;
      bottom: 1rem !important;
    }
    .provider-popup.show { transform: none !important; }
    .top-nav .nav-search-wrap { max-width: 100%; flex: 1; }
  }

  /* Map grid */
  .map-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(30,29,26,.1) 1px, transparent 1px), linear-gradient(90deg,rgba(30,29,26,.1) 1px,transparent 1px); background-size: 40px 40px; }

  /* Street lines */
  .map-street { position: absolute; background: rgba(245,244,240,.6); }

  /* Zone labels */
  .map-label { position: absolute; font-family: var(--font-mono); font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(30,29,26,.35); pointer-events: none; }

  /* Map controls */
  .map-controls { position: absolute; top: 1rem; right: 1rem; display: flex; flex-direction: column; gap: .4rem; z-index: 10; }
  .map-ctrl-btn { width: 36px; height: 36px; background: var(--white); border: 1px solid rgba(30,29,26,.15); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; transition: background .2s, border-color .2s; }
  .map-ctrl-btn:hover { background: var(--off-white); border-color: var(--black); }

  /* Map overlay top */
  .map-overlay-top { position: absolute; top: 1rem; left: 1rem; right: 5rem; z-index: 10; display: flex; gap: .5rem; flex-wrap: wrap; }
  .map-filter-chip { display: flex; align-items: center; gap: .3rem; padding: .3rem .7rem; background: var(--white); border: 1px solid rgba(30,29,26,.15); font-size: .68rem; font-family: var(--font-mono); letter-spacing: 1px; cursor: pointer; transition: background .2s, border-color .2s; }
  .map-filter-chip.active { background: var(--black); color: var(--white); border-color: var(--black); }
  .map-filter-chip:hover:not(.active) { border-color: var(--black); }

  /* Map bottom legend */
  .map-legend { position: absolute; bottom: 1rem; left: 1rem; font-family: var(--font-mono); font-size: .62rem; letter-spacing: 1px; color: rgba(30,29,26,.5); text-transform: uppercase; }

  /* Pins */
  .map-pin { position: absolute; cursor: pointer; transform: translate(-50%,-50%); z-index: 5; }
  .pin-dot { border-radius: 50%; position: relative; transition: transform .2s; }
  .pin-dot::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); border-radius: 50%; animation: pinRipple 2s infinite; }
  @keyframes pinRipple { 0% { width:100%; height:100%; opacity:.6; } 100% { width:300%; height:300%; opacity:0; } }
  .map-pin:hover .pin-dot { transform: scale(1.3); }
  .pin-label { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--black); color: var(--white); font-family: var(--font-mono); font-size: .6rem; letter-spacing: 1px; padding: .2rem .5rem; white-space: nowrap; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .map-pin:hover .pin-label { opacity: 1; }

  /* User position */
  .user-pin { position: absolute; transform: translate(-50%,-50%); z-index: 6; }
  .user-dot-outer { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--accent); background: rgba(232,224,58,.15); display: flex; align-items: center; justify-content: center; animation: userPulse 2s ease-in-out infinite; }
  @keyframes userPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(232,224,58,.4); } 50% { box-shadow: 0 0 0 8px rgba(232,224,58,0); } }
  .user-dot-inner { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

  /* Provider popup */
  .provider-popup {
    position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
    width: 300px; background: var(--white); border: 1px solid rgba(30,29,26,.15);
    box-shadow: 0 16px 40px rgba(0,0,0,.12); z-index: 20;
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s cubic-bezier(.22,1,.36,1);
  }
  .provider-popup.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
  .popup-header { padding: 1rem 1.2rem; border-bottom: 1px solid rgba(30,29,26,.08); display: flex; align-items: center; gap: .9rem; }
  .popup-avatar { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1.1rem; flex-shrink: 0; }
  .popup-name { font-size: .95rem; font-weight: 500; }
  .popup-role { font-size: .7rem; font-family: var(--font-mono); color: var(--gray-mid); letter-spacing: 1px; margin-top: 2px; }
  .popup-close { margin-left: auto; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(30,29,26,.1); font-size: .9rem; transition: border-color .2s; }
  .popup-close:hover { border-color: var(--black); }
  .popup-body { padding: .9rem 1.2rem; }
  .popup-tags { display: flex; gap: .35rem; flex-wrap: wrap; margin-bottom: .8rem; }
  .popup-tag { padding: .22rem .6rem; border: 1px solid var(--gray-light); font-size: .65rem; letter-spacing: 1px; color: var(--gray-dark); }
  .popup-footer { display: flex; gap: .5rem; padding: .8rem 1.2rem; border-top: 1px solid rgba(30,29,26,.08); }
  .popup-btn { flex: 1; padding: .6rem; text-align: center; font-size: .72rem; letter-spacing: 1.5px; text-transform: uppercase; font-family: var(--font-body); font-weight: 500; cursor: pointer; transition: background .2s, color .2s; border: none; text-decoration: none; display: block; }
  .popup-btn-primary { background: var(--accent); color: var(--black); }
  .popup-btn-primary:hover { background: var(--black); color: var(--white); }
  .popup-btn-secondary { background: transparent; color: var(--black); border: 1px solid rgba(30,29,26,.2); }
  .popup-btn-secondary:hover { border-color: var(--black); }
  .popup-meta { display: flex; align-items: center; gap: 1rem; font-family: var(--font-mono); font-size: .68rem; }
  .popup-dist { color: var(--gray-mid); }
  .popup-rating { color: var(--accent); font-weight: 500; }
  .popup-avail { color: var(--accent3); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .pcard { animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both; }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- TOP NAV -->
<nav class="top-nav">
  <a href="skillmap.html" class="nav-logo">Skill<span>Map</span></a>
  <div class="nav-search-wrap">
    <input class="nav-search-input" type="text" placeholder="Plombier, graphiste, coiffeur…" id="navSearch" />
    <span class="nav-loc"><i data-lucide="map-pin"></i> Abidjan</span>
    <button class="nav-search-btn"><i data-lucide="search"></i></button>
  </div>
  <div class="nav-right">
    <a href="notifications.html" class="nav-notif" style="text-decoration:none;"><i data-lucide="bell"></i><span class="notif-dot"></span></a>
    <a href="home-client.html" class="nav-notif" style="text-decoration:none;font-size:.7rem;letter-spacing:.5px;font-family:var(--font-mono);padding:0 .6rem;width:auto;">Accueil</a>
    <div class="nav-avatar" id="navAvatar" title="Mon profil" onclick="window.location.href='profil-utilisateur.html'">U</div>
  </div>
</nav>

<!-- APP LAYOUT -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-count"><span id="resultCount">24</span> prestataires trouvés</div>
      <div class="cats-wrap">
        <button class="cat-pill active" onclick="filterCat(this,'all')">Tous</button>
        <button class="cat-pill" onclick="filterCat(this,'artisanat')"><i data-lucide="wrench"></i> Artisanat</button>
        <button class="cat-pill" onclick="filterCat(this,'elec')"><i data-lucide="zap"></i> Élec.</button>
        <button class="cat-pill" onclick="filterCat(this,'beaute')"><i data-lucide="scissors"></i> Beauté</button>
        <button class="cat-pill" onclick="filterCat(this,'design')"><i data-lucide="palette"></i> Design</button>
        <button class="cat-pill" onclick="filterCat(this,'mecanique')"><i data-lucide="car"></i> Méca.</button>
        <button class="cat-pill" onclick="filterCat(this,'education')"><i data-lucide="book-open"></i> Éducation</button>
      </div>
    </div>

    <div class="sidebar-filters">
      <div class="filter-row">
        <span class="filter-label">Distance max</span>
        <span class="filter-val" id="distVal">5 km</span>
      </div>
      <input type="range" id="distRange" min="1" max="20" value="5" step="1"
        style="width:100%;margin-bottom:.8rem;accent-color:var(--black);cursor:pointer;"
        oninput="document.getElementById('distVal').textContent=this.value+' km'"
        onchange="loadProviders()" />
      <div class="avail-toggle">
        <span class="filter-label">Disponibles uniquement</span>
        <div class="toggle-switch" id="availToggle" onclick="this.classList.toggle('off');loadProviders()"></div>
      </div>
    </div>

    <div class="sidebar-list" id="providerList">
      <!-- Cards injected by JS -->
    </div>
  </aside>

  <!-- DETAIL PANEL (affiché au clic sur un prestataire) -->
  <div id="detailPanel" style="width:380px;flex-shrink:0;border-left:1px solid rgba(30,29,26,.1);overflow-y:auto;background:var(--white);display:none;"></div>

  <!-- MAP -->
  <main class="map-area" id="mapArea">
    <div class="map-bg"></div>

    <!-- Streets -->
    <div class="map-street" style="left:0;right:0;top:35%;height:8px;"></div>
    <div class="map-street" style="left:0;right:0;top:62%;height:5px;"></div>
    <div class="map-street" style="top:0;bottom:0;left:28%;width:6px;"></div>
    <div class="map-street" style="top:0;bottom:0;left:60%;width:4px;"></div>
    <div class="map-street" style="top:0;bottom:0;left:80%;width:3px;"></div>
    <div class="map-street" style="left:0;right:0;top:15%;height:3px;opacity:.5;"></div>
    <div class="map-street" style="left:0;right:0;top:80%;height:3px;opacity:.5;"></div>

    <!-- Zone labels -->
    <div class="map-label" style="top:20%;left:10%;">Cocody</div>
    <div class="map-label" style="top:25%;left:38%;">Plateau</div>
    <div class="map-label" style="top:45%;left:65%;">Marcory</div>
    <div class="map-label" style="top:70%;left:12%;">Yopougon</div>
    <div class="map-label" style="top:68%;left:42%;">Adjamé</div>
    <div class="map-label" style="top:18%;left:68%;">Treichville</div>

    <!-- Filter chips -->
    <div class="map-overlay-top">
      <div class="map-filter-chip active"><i data-lucide="map-pin"></i> Tous</div>
      <div class="map-filter-chip"><i data-lucide="badge-check"></i> Disponible</div>
      <div class="map-filter-chip"><i data-lucide="star"></i> 4.5+</div>
      <div class="map-filter-chip"><i data-lucide="ruler"></i> &lt; 2km</div>
    </div>

    <!-- Map controls -->
    <div class="map-controls">
      <div class="map-ctrl-btn" title="Zoom +">+</div>
      <div class="map-ctrl-btn" title="Zoom −">−</div>
      <div class="map-ctrl-btn" title="Ma position" onclick="locateUser()">◎</div>
    </div>

    <!-- Legend -->
    <div class="map-legend">● vous &nbsp; ● disponible &nbsp; ● occupé</div>

    <!-- User pin -->
    <div class="user-pin" style="top:38%;left:32%;">
      <div class="user-dot-outer"><div class="user-dot-inner"></div></div>
    </div>

    <!-- Provider pins (injected by JS) -->
    <div id="mapPins"></div>

    <!-- Popup -->
    <div class="provider-popup" id="providerPopup">
      <div class="popup-header">
        <div class="popup-avatar" id="popupAvatar">KO</div>
        <div>
          <div class="popup-name" id="popupName">Koné Oumar</div>
          <div class="popup-role" id="popupRole">Plombier · Cocody</div>
        </div>
        <div class="popup-close" onclick="closePopup()"><i data-lucide="x"></i></div>
      </div>
      <div class="popup-body">
        <div class="popup-meta">
          <span class="popup-dist" id="popupDist"><i data-lucide="map-pin"></i> 0.8 km</span>
          <span class="popup-rating" id="popupRating">★ 4.9</span>
          <span class="popup-avail" id="popupAvail">● Disponible</span>
        </div>
        <div class="popup-tags" id="popupTags"></div>
      </div>
      <div class="popup-footer">
        <span class="popup-btn popup-btn-primary" id="popupViewBtn" onclick="openDetailFromPopup()">Voir le profil</span>
        <span class="popup-btn popup-btn-secondary" id="popupContactBtn" onclick="contactFromPopup()">Contacter</span>
      </div>
    </div>
  </main>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor'), ring = document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function anim(){cursor.style.left=mx+'px';cursor.style.top=my+'px';rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim);})();

  // Providers data
  const providers = [
    { id:'ko', numericId:1, userId:4,  init:'KO', name:'Koné Oumar',     role:'Plombier',               zone:'Cocody',      dist:'0.8', rating:'4.9', tags:['Installation','Réparation','Urgence'],      avail:true,  color:'#2eff9e', bg:'rgba(46,255,158,.1)',  top:30, left:30 },
    { id:'at', numericId:2, userId:5,  init:'AT', name:'Aïcha Touré',    role:'Graphiste & UI',          zone:'Plateau',     dist:'1.4', rating:'5.0', tags:['Logo','Affiches','UI/UX'],                  avail:true,  color:'#e8e03a', bg:'rgba(232,224,58,.12)', top:22, left:42 },
    { id:'bd', numericId:3, userId:6,  init:'BD', name:'Bamba Diabaté',  role:'Électricien',             zone:'Yopougon',    dist:'2.1', rating:'4.8', tags:['Câblage','Tableau','Dépannage'],             avail:false, color:'#ff4d2e', bg:'rgba(255,77,46,.1)',   top:72, left:18 },
    { id:'fk', numericId:4, userId:7,  init:'FK', name:'Fatou Kouyaté',  role:'Coiffeuse',               zone:'Marcory',     dist:'1.1', rating:'4.9', tags:['Tresses','Colorations','Soins'],             avail:true,  color:'#2eff9e', bg:'rgba(46,255,158,.1)',  top:48, left:68 },
    { id:'ms', numericId:5, userId:8,  init:'MS', name:'Moussa Sanogo',  role:'Mécanicien Auto',         zone:'Adjamé',      dist:'3.2', rating:'4.7', tags:['Diagnostic','Vidange','Freinage'],           avail:true,  color:'#2eff9e', bg:'rgba(46,255,158,.1)',  top:65, left:50 },
    { id:'ib', numericId:6, userId:9,  init:'IB', name:'Ibrahim Bah',    role:'Réparateur Téléphone',    zone:'Treichville', dist:'1.8', rating:'4.8', tags:['Écrans','Batteries','Software'],             avail:true,  color:'#e8e03a', bg:'rgba(232,224,58,.1)',  top:15, left:72 },
    { id:'sa', numericId:7, userId:10, init:'SA', name:'Sylvie Adjoua',  role:'Couturière',              zone:'Treichville', dist:'2.4', rating:'4.6', tags:['Retouches','Création','Broderie'],           avail:true,  color:'#2eff9e', bg:'rgba(46,255,158,.1)',  top:42, left:22 },
    { id:'yb', numericId:8, userId:11, init:'AC', name:'Amadou Coulibaly',role:'Maçon & Carreleur',      zone:'Abobo',       dist:'1.6', rating:'4.9', tags:['Carrelage','Construction','Enduit'],        avail:true,  color:'#ff4d2e', bg:'rgba(255,77,46,.08)',  top:28, left:58 },
  ];

  function renderSidebar(list) {
    const el = document.getElementById('providerList');
    document.getElementById('resultCount').textContent = list.length;
    el.innerHTML = list.map((p,i) => `
      <a class="pcard ${p.avail?'is-available':''}" href="provider-profile.html?id=${p.id}" style="animation-delay:${i*60}ms;" data-id="${p.id}" onclick="selectCard(event,'${p.id}')">
        <div class="pcard-av" style="background:${p.bg};color:${p.color};border:1px solid ${p.color}44;">${p.init}</div>
        <div class="pcard-body">
          <div class="pcard-name">${p.name}</div>
          <div class="pcard-role">${p.role} · ${p.zone}</div>
          <div class="pcard-meta">
            <span class="pcard-dist"><i data-lucide="map-pin"></i> ${p.dist} km</span>
            <span class="pcard-rating">★ ${p.rating}</span>
            <span class="pcard-badge ${p.avail?'':'busy'}">${p.avail?'Disponible':'Occupé'}</span>
          </div>
        </div>
      </a>`).join('');
    // Re-bind cursor
    document.querySelectorAll('.pcard').forEach(el=>{
      el.addEventListener('mouseenter',()=>{cursor.style.width='20px';cursor.style.height='20px';ring.style.width='60px';ring.style.height='60px';});
      el.addEventListener('mouseleave',()=>{cursor.style.width='12px';cursor.style.height='12px';ring.style.width='40px';ring.style.height='40px';});
    });
  }

  function renderPins(list) {
    const el = document.getElementById('mapPins');
    el.innerHTML = list.map(p => `
      <div class="map-pin" style="top:${p.top}%;left:${p.left}%;" onclick="showPopup('${p.id}')">
        <div class="pin-dot" style="width:${p.avail?12:10}px;height:${p.avail?12:10}px;background:${p.avail?'#2eff9e':'#ff4d2e'};box-shadow:0 0 0 3px ${p.avail?'rgba(46,255,158,.25)':'rgba(255,77,46,.2)'};"></div>
        <div class="pin-label">${p.name}</div>
      </div>`).join('');
  }

  let _currentPopupProvider = null;

  function selectCard(e, id) {
    e.preventDefault();
    document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('active'));
    document.querySelector(`.pcard[data-id="${id}"]`)?.classList.add('active');
    const p = providers.find(x=>x.id===id);
    if (p) showPopup(id);
  }

  function showPopup(id) {
    const p = providers.find(x=>x.id===id);
    if (!p) return;
    _currentPopupProvider = p;
    document.getElementById('popupAvatar').textContent = p.init;
    document.getElementById('popupAvatar').style.cssText = `background:${p.bg};color:${p.color};border:1px solid ${p.color}44;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.1rem;flex-shrink:0;`;
    document.getElementById('popupName').textContent = p.name;
    document.getElementById('popupRole').textContent = `${p.role} · ${p.zone}`;
    document.getElementById('popupDist').innerHTML = `<i data-lucide="map-pin"></i> ${p.dist} km`;
    lucide.createIcons({ el: document.getElementById('popupDist') });
    document.getElementById('popupRating').innerHTML = `<i data-lucide="star"></i> ${p.rating}`;
    document.getElementById('popupAvail').textContent = p.avail ? '● Disponible' : '● Occupé';
    document.getElementById('popupAvail').style.color = p.avail ? 'var(--accent3)' : 'var(--accent2)';
    document.getElementById('popupTags').innerHTML = p.tags.map(t=>`<span class="popup-tag">${t}</span>`).join('');
    document.getElementById('providerPopup').classList.add('show');
  }

  function closePopup() {
    document.getElementById('providerPopup').classList.remove('show');
    _currentPopupProvider = null;
  }

  function openDetailFromPopup() {
    if (!_currentPopupProvider) return;
    const id = _currentPopupProvider.numericId;
    closePopup();
    if (id) window.location.href = `provider-profile.html?id=${id}&from=dashboard-client.html`;
  }

  function contactFromPopup() {
    if (!_currentPopupProvider) return;
    const { userId, name } = _currentPopupProvider;
    closePopup();
    if (userId) window.location.href = `messages.html?user=${userId}&name=${encodeURIComponent(name)}`;
  }

  function filterCat(btn, cat) {
    document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    renderSidebar(providers);
    renderPins(providers);
  }

  function locateUser() {
    const userPin = document.querySelector('.user-pin');
    userPin.style.transition = 'top .5s ease, left .5s ease';
    userPin.style.top = '38%'; userPin.style.left = '32%';
  }

  // Init static visual — replaced by API data once loaded
  renderSidebar(providers);
  renderPins(providers);

  // Cursor hover
  document.querySelectorAll('a,button,.map-ctrl-btn,.map-filter-chip,.nav-avatar,.nav-notif').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cursor.style.width='20px';cursor.style.height='20px';ring.style.width='60px';ring.style.height='60px';});
    el.addEventListener('mouseleave',()=>{cursor.style.width='12px';cursor.style.height='12px';ring.style.width='40px';ring.style.height='40px';});
  });

  // Show detail panel and update popup links with real API providers
  const origOpenDetail = window.openDetail;
  window.openDetail = function(p) {
    document.getElementById('detailPanel').style.display = 'block';
    if (origOpenDetail) origOpenDetail(p);
  };

  // Wire map filter chips to real filters
  document.querySelectorAll('.map-filter-chip').forEach(chip => {
    chip.addEventListener('click', function() {
      const txt = this.textContent.trim();
      if (txt.includes('Disponible')) {
        const t = document.getElementById('availToggle');
        if (t) { t.classList.toggle('off'); if(window.loadProviders) loadProviders(); }
      } else if (txt.includes('4.5')) {
        // Toggle min rating filter — stored in data attr
        this.classList.toggle('active');
        const active = this.classList.contains('active');
        this.dataset.minRating = active ? '4.5' : '';
        if(window.loadProviders) loadProviders();
      } else if (txt.includes('2km')) {
        const r = document.getElementById('distRange');
        if(r) { r.value = 2; document.getElementById('distVal').textContent = '2 km'; if(window.loadProviders) loadProviders(); }
      }
    });
  });
</script>

<!-- ── Intégration API SkillMap ── -->
<script src="frontend/js/api.js"></script>
<script src="frontend/js/auth.js"></script>
<script src="frontend/js/dashboard-client.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
