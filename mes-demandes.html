<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillMap — Demandes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #1e1d1a; --white: #f5f4f0; --off-white: #eeece6;
  --gray-light: #d8d6cf; --gray-mid: #8a8880; --gray-dark: #3a3936;
  --accent: #e8e03a; --accent2: #ff4d2e; --accent3: #2eff9e;
  --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
}
body { font-family: var(--font-body); background: var(--white); color: var(--black); }
.top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 60px; display: flex; align-items: center; padding: 0 2rem; gap: 1.5rem; background: rgba(245,244,240,.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(30,29,26,.1); }
.nav-logo { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 3px; color: var(--black); text-decoration: none; }
.nav-logo span { color: var(--accent); }
.nav-back { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 1.5px; color: var(--gray-mid); text-decoration: none; padding: .4rem .8rem; border: 1px solid rgba(30,29,26,.15); transition: all .2s; }
.nav-back:hover { color: var(--black); border-color: var(--black); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
.nav-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--black); color: var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: .9rem; cursor: pointer; }

.main-wrap { padding-top: 60px; max-width: 900px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; padding-bottom: 4rem; }
.page-header { padding: 2.5rem 0 1.5rem; border-bottom: 1px solid rgba(30,29,26,.08); margin-bottom: 1.5rem; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
.page-title { font-family: var(--font-display); font-size: 2.5rem; letter-spacing: 3px; }
.page-sub { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-mid); margin-top: .3rem; }
.btn-new { padding: .7rem 1.5rem; background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--font-mono); font-size: .68rem; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; transition: background .2s; }
.btn-new:hover { background: var(--gray-dark); }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid rgba(30,29,26,.1); margin-bottom: 1.5rem; }
.tab { padding: .7rem 1.2rem; font-family: var(--font-mono); font-size: .65rem; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; color: var(--gray-mid); transition: color .2s, border-color .2s; margin-bottom: -1px; }
.tab.active { color: var(--black); border-color: var(--black); }

/* Request cards */
.request-list { display: flex; flex-direction: column; gap: .8rem; }
.req-card { border: 1px solid rgba(30,29,26,.1); transition: border-color .2s; }
.req-card:hover { border-color: rgba(30,29,26,.25); }
.req-card-body { padding: 1.2rem 1.4rem; display: grid; grid-template-columns: 1fr auto; gap: 1rem; align-items: start; }
.req-title { font-size: .95rem; font-weight: 500; margin-bottom: .35rem; }
.req-meta { font-family: var(--font-mono); font-size: .65rem; letter-spacing: 1px; color: var(--gray-mid); margin-bottom: .5rem; }
.req-desc { font-size: .8rem; color: var(--gray-dark); line-height: 1.6; font-weight: 300; }
.req-date { font-family: var(--font-mono); font-size: .6rem; color: var(--gray-mid); margin-top: .6rem; letter-spacing: 1px; }
.req-right { display: flex; flex-direction: column; align-items: flex-end; gap: .6rem; }
.status-badge { font-size: .6rem; font-family: var(--font-mono); letter-spacing: 1px; padding: .3rem .7rem; white-space: nowrap; }
.status-pending    { background: rgba(232,224,58,.1);  color: #b8a800; border: 1px solid rgba(232,224,58,.4); }
.status-accepted   { background: rgba(46,255,158,.08); color: #00a862; border: 1px solid rgba(46,255,158,.3); }
.status-in_progress{ background: rgba(0,201,177,.1);   color: #007a6e; border: 1px solid rgba(0,201,177,.3); }
.status-completed  { background: rgba(30,29,26,.05);   color: var(--gray-dark); border: 1px solid rgba(30,29,26,.15); }
.status-rejected   { background: rgba(255,77,46,.08);  color: var(--accent2); border: 1px solid rgba(255,77,46,.2); }
.status-cancelled  { background: rgba(255,77,46,.06);  color: var(--accent2); border: 1px solid rgba(255,77,46,.15); }
.btn-msg { padding: .45rem .9rem; background: transparent; border: 1px solid rgba(30,29,26,.2); cursor: pointer; font-family: var(--font-mono); font-size: .6rem; letter-spacing: 1px; text-transform: uppercase; transition: border-color .2s; }
.btn-msg:hover { border-color: var(--black); }

/* Actions bar (provider) */
.req-actions { padding: .65rem 1.4rem; border-top: 1px solid rgba(30,29,26,.06); background: rgba(30,29,26,.02); display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
.act-label { font-family: var(--font-mono); font-size: .58rem; color: var(--gray-mid); letter-spacing: 1px; margin-right: .3rem; }
.act-btn { padding: .4rem .9rem; font-family: var(--font-mono); font-size: .6rem; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border: none; transition: all .2s; }
.act-btn.accept   { background: var(--accent); color: var(--black); }
.act-btn.accept:hover { background: #d4cc35; }
.act-btn.progress { background: var(--black); color: var(--white); }
.act-btn.progress:hover { background: var(--gray-dark); }
.act-btn.done     { background: rgba(46,255,158,.15); color: #00a862; border: 1px solid rgba(46,255,158,.3); }
.act-btn.done:hover { background: rgba(46,255,158,.25); }
.act-btn.reject   { background: rgba(255,77,46,.1); color: var(--accent2); border: 1px solid rgba(255,77,46,.2); margin-left: auto; }
.act-btn.reject:hover { background: rgba(255,77,46,.18); }
.act-btn.cancel   { background: rgba(255,77,46,.08); color: var(--accent2); border: 1px solid rgba(255,77,46,.15); }
.act-btn.cancel:hover { background: rgba(255,77,46,.15); }
.act-btn:disabled { opacity: .4; cursor: not-allowed; }

/* Confirm overlay */
.confirm-overlay { position: fixed; inset: 0; background: rgba(30,29,26,.6); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.confirm-box { background: var(--white); max-width: 380px; width: 100%; padding: 2rem; }
.confirm-box h3 { font-family: var(--font-display); font-size: 1.4rem; letter-spacing: 2px; margin-bottom: .8rem; }
.confirm-box p { font-size: .85rem; color: var(--gray-dark); line-height: 1.6; margin-bottom: 1.5rem; }
.confirm-actions { display: flex; gap: .6rem; }
.confirm-actions button { flex: 1; padding: .65rem; font-family: var(--font-mono); font-size: .62rem; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border: none; }
.confirm-yes { background: var(--accent2); color: var(--white); }
.confirm-no  { background: transparent; border: 1px solid rgba(30,29,26,.2) !important; color: var(--black); }

.empty-state { text-align: center; padding: 5rem 2rem; }
.empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
.empty-state h2 { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 2px; margin-bottom: .6rem; }
.empty-state p { color: var(--gray-mid); font-size: .85rem; margin-bottom: 2rem; }
.btn-primary { display: inline-block; padding: .8rem 2rem; background: var(--black); color: var(--white); text-decoration: none; font-family: var(--font-mono); font-size: .72rem; letter-spacing: 2px; text-transform: uppercase; }
.skeleton { background: linear-gradient(90deg, var(--gray-light) 25%, var(--off-white) 50%, var(--gray-light) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
</style>
</head>

  completed:   { label: 'Terminée',    cls: 'status-completed'   },

function renderProviderCard(r) {
  const s = statusMap[r.status] || statusMap.pending;
  const date = new Date(r.created_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' });
  const safeClientName = (r.client_name || 'le client').replace(/'/g, "\\'");
  const actionsHtml = buildProviderActions(r);
  return `
    <div class="req-card" id="req-${r.id}">
      <div class="req-card-body">
        <div>
          <div class="req-title">${escHtml(r.title)}</div>
          <div class="req-meta">Client : ${escHtml(r.client_name || '—')}</div>
          ${r.description ? `<div class="req-desc">${escHtml(r.description)}</div>` : ''}
          <div class="req-date">${date}</div>
        </div>
        <div class="req-right">
          <span class="status-badge ${s.cls}">${s.label}</span>
          <button class="btn-msg" onclick="contactUser(${r.client_id}, '${safeClientName}')">💬 Message</button>
        </div>
      </div>
      ${actionsHtml}
    </div>`;
}

function buildProviderActions(r) {
  if (r.status === 'completed' || r.status === 'rejected' || r.status === 'cancelled') return '';

  let buttons = '';
  if (r.status === 'pending') {
    buttons = `
      <span class="act-label">Actions :</span>
      <button class="act-btn accept" onclick="changeStatus(${r.id}, 'accepted')">✓ Accepter</button>
      <button class="act-btn reject" onclick="confirmReject(${r.id})">✕ Refuser</button>`;
  } else if (r.status === 'accepted') {
    buttons = `
      <span class="act-label">Actions :</span>
      <button class="act-btn progress" onclick="changeStatus(${r.id}, 'in_progress')">▶ Démarrer</button>
      <button class="act-btn cancel" onclick="confirmReject(${r.id})">✕ Annuler</button>`;
  } else if (r.status === 'in_progress') {
    buttons = `
      <span class="act-label">Actions :</span>
      <button class="act-btn done" onclick="changeStatus(${r.id}, 'completed')">✓ Terminer</button>`;
  }

  return `<div class="req-actions">${buttons}</div>`;
}

async function changeStatus(id, newStatus) {
  const btn = document.querySelector(`#req-${id} .act-btn`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    await api.services.updateStatus(id, newStatus);
    await loadRequests();
  } catch (e) {
    alert('Erreur : ' + e.message);
    if (btn) { btn.disabled = false; }
    await loadRequests();
  }
}

function confirmReject(id) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>CONFIRMER LE REFUS</h3>
      <p>Voulez-vous vraiment refuser cette demande ? Cette action est irréversible.</p>
      <div class="confirm-actions">
        <button class="act-btn reject confirm-yes" onclick="doReject(${id}, this.closest('.confirm-overlay'))">Refuser</button>
        <button class="act-btn confirm-no" onclick="this.closest('.confirm-overlay').remove()">Annuler</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function doReject(id, overlay) {
  overlay.remove();
  await changeStatus(id, 'rejected');
}

function setFilter(filter, el) {
  _filter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderRequests();
}

function contactUser(userId, name) {
  if (!userId) return;
  window.location.href = `messages.html?user=${userId}&name=${encodeURIComponent(name)}`;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadRequests();
lucide.createIcons();
</script>
