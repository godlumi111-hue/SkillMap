<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillMap — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #1e1d1a; --white: #f5f4f0; --off-white: #eeece6;
  --gray-light: #d8d6cf; --gray-mid: #8a8880; --gray-dark: #3a3936;
  --accent: #e8e03a; --accent2: #ff4d2e; --accent3: #2eff9e;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-body); background: var(--white); color: var(--black); }

/* NAV */
.top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 60px; display: flex; align-items: center; padding: 0 2rem; gap: 1.5rem; background: rgba(245,244,240,.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(30,29,26,.1); }
.nav-logo { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 3px; color: var(--black); text-decoration: none; }
.nav-logo span { color: var(--accent); }
.nav-back { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 1.5px; color: var(--gray-mid); text-decoration: none; padding: .4rem .8rem; border: 1px solid rgba(30,29,26,.15); transition: all .2s; }
.nav-back:hover { color: var(--black); border-color: var(--black); }
.nav-right { margin-left: auto; display: flex; gap: .8rem; align-items: center; }
.nav-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--black); color: var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: .9rem; cursor: pointer; }

/* LAYOUT */
.app-layout { display: flex; height: 100vh; padding-top: 60px; }

/* CONV LIST */
.conv-panel {
  width: 320px; flex-shrink: 0; border-right: 1px solid rgba(30,29,26,.1);
  display: flex; flex-direction: column; background: var(--white);
}
.conv-header { padding: 1.2rem 1.4rem; border-bottom: 1px solid rgba(30,29,26,.08); }
.conv-title { font-family: var(--font-display); font-size: 1.4rem; letter-spacing: 2px; }
.conv-search { margin-top: .8rem; display: flex; border: 1px solid rgba(30,29,26,.15); }
.conv-search input { flex: 1; padding: .55rem .8rem; background: transparent; border: none; outline: none; font-family: var(--font-body); font-size: .82rem; color: var(--black); }
.conv-search input::placeholder { color: var(--gray-mid); }

.conv-list { flex: 1; overflow-y: auto; }
.conv-list::-webkit-scrollbar { width: 3px; }
.conv-list::-webkit-scrollbar-thumb { background: var(--gray-light); }
.conv-item { display: flex; align-items: center; gap: .9rem; padding: 1rem 1.4rem; cursor: pointer; border-bottom: 1px solid rgba(30,29,26,.05); transition: background .15s; position: relative; }
.conv-item:hover { background: var(--off-white); }
.conv-item.active { background: rgba(232,224,58,.06); border-right: 2px solid var(--accent); }
.conv-av { width: 42px; height: 42px; flex-shrink: 0; background: rgba(30,29,26,.07); color: var(--black); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 1rem; border: 1px solid rgba(30,29,26,.1); }
.conv-body { flex: 1; min-width: 0; }
.conv-name { font-size: .85rem; font-weight: 500; }
.conv-preview { font-size: .72rem; color: var(--gray-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.conv-right { text-align: right; flex-shrink: 0; }
.conv-time { font-family: var(--font-mono); font-size: .58rem; color: var(--gray-mid); letter-spacing: .5px; }
.conv-unread { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); margin: .3rem 0 0 auto; }

.conv-new-btn { padding: 1rem 1.4rem; border-top: 1px solid rgba(30,29,26,.08); }
.btn-new-conv { width: 100%; padding: .7rem; background: var(--black); color: var(--white); border: none; cursor: pointer; font-family: var(--font-mono); font-size: .65rem; letter-spacing: 2px; text-transform: uppercase; transition: background .2s; }
.btn-new-conv:hover { background: var(--gray-dark); }

/* THREAD */
.thread-panel { flex: 1; display: flex; flex-direction: column; }
.thread-header { padding: 1.2rem 1.6rem; border-bottom: 1px solid rgba(30,29,26,.08); background: var(--white); display: flex; align-items: center; gap: 1rem; }
.thread-av { width: 38px; height: 38px; background: rgba(30,29,26,.07); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: .95rem; border: 1px solid rgba(30,29,26,.1); flex-shrink: 0; }
.thread-name { font-size: .9rem; font-weight: 500; }
.thread-role { font-family: var(--font-mono); font-size: .6rem; color: var(--gray-mid); letter-spacing: 1px; margin-top: 1px; }
.thread-actions { margin-left: auto; display: flex; gap: .5rem; }
.thread-action-btn { padding: .4rem .8rem; border: 1px solid rgba(30,29,26,.15); background: transparent; cursor: pointer; font-family: var(--font-mono); font-size: .62rem; letter-spacing: 1px; text-transform: uppercase; color: var(--gray-mid); transition: all .2s; }
.thread-action-btn:hover { border-color: var(--black); color: var(--black); }

.thread-messages { flex: 1; overflow-y: auto; padding: 1.5rem 1.6rem; display: flex; flex-direction: column; gap: .8rem; background: var(--off-white); }
.thread-messages::-webkit-scrollbar { width: 3px; }
.thread-messages::-webkit-scrollbar-thumb { background: var(--gray-light); }

.msg-bubble { max-width: 68%; }
.msg-bubble.mine { align-self: flex-end; }
.msg-bubble.theirs { align-self: flex-start; }
.bubble-content { padding: .75rem 1rem; font-size: .85rem; line-height: 1.5; }
.mine .bubble-content { background: var(--black); color: var(--white); }
.theirs .bubble-content { background: var(--white); color: var(--black); border: 1px solid rgba(30,29,26,.1); }
.bubble-time { font-family: var(--font-mono); font-size: .6rem; color: var(--gray-mid); margin-top: .25rem; }
.mine .bubble-time { text-align: right; }

.thread-date-sep { text-align: center; font-family: var(--font-mono); font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-mid); padding: .5rem 0; }

.thread-input-area { padding: 1rem 1.6rem; border-top: 1px solid rgba(30,29,26,.08); background: var(--white); display: flex; gap: .8rem; align-items: flex-end; }
.msg-input { flex: 1; padding: .75rem 1rem; border: 1px solid rgba(30,29,26,.15); background: transparent; font-family: var(--font-body); font-size: .88rem; color: var(--black); outline: none; resize: none; min-height: 44px; max-height: 120px; transition: border-color .2s; }
.msg-input:focus { border-color: var(--black); }
.msg-input::placeholder { color: var(--gray-mid); }
.send-btn { padding: .75rem 1.4rem; background: var(--accent); color: var(--black); border: none; cursor: pointer; font-family: var(--font-mono); font-size: .68rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; transition: background .2s; white-space: nowrap; }
.send-btn:hover { background: var(--black); color: var(--white); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }

/* Empty state */
.empty-thread { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; background: var(--off-white); }
.empty-icon { font-size: 3rem; }
.empty-title { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 2px; }
.empty-sub { font-family: var(--font-mono); font-size: .68rem; letter-spacing: 1.5px; color: var(--gray-mid); text-align: center; max-width: 240px; line-height: 1.6; }

.skeleton { background: linear-gradient(90deg, var(--gray-light) 25%, var(--off-white) 50%, var(--gray-light) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }

@media (max-width: 600px) { .conv-panel { width: 100%; display: none; } .conv-panel.mobile-show { display: flex; width: 100%; } }
</style>
</head>
<body>
<nav class="top-nav">
  <a href="#" id="navHome" class="nav-logo">SKILL<span>MAP</span></a>
  <a href="#" id="navBack" class="nav-back">← Retour</a>
  <div class="nav-right">
    <div class="nav-avatar" id="navAvatar">?</div>
  </div>
</nav>

<div class="app-layout">
  <!-- Conversations -->
  <div class="conv-panel">
    <div class="conv-header">
      <div class="conv-title">MESSAGES</div>
      <div class="conv-search">
        <input type="text" id="convSearch" placeholder="Rechercher une conversation…" oninput="filterConvs(this.value)" />
      </div>
    </div>
    <div class="conv-list" id="convList">
      <div style="padding:2rem;text-align:center;" class="skeleton" style="height:60px;"></div>
    </div>
    <div class="conv-new-btn">
      <button class="btn-new-conv" onclick="newConversation()">+ Nouveau message</button>
    </div>
  </div>

  <!-- Thread -->
  <div class="thread-panel" id="threadPanel">
    <div class="empty-thread" id="emptyThread">
      <div class="empty-icon"><i data-lucide="message-circle"></i></div>
      <div class="empty-title">VOS MESSAGES</div>
      <div class="empty-sub">Sélectionnez une conversation ou démarrez-en une nouvelle.</div>
    </div>
  </div>
</div>

<script src="frontend/js/api.js"></script>
<script src="frontend/js/auth.js"></script>
<script>
AUTH.requireAuth();
const _user = AUTH.getUser();
const isProvider = _user?.role === 'provider';

// Nav
const backHref = isProvider ? 'dashboard-prestataire.html' : 'home-client.html';
document.getElementById('navHome').href = backHref;
document.getElementById('navBack').href = backHref;
document.getElementById('navAvatar').textContent = (_user?.full_name?.split(' ').map(w=>w[0]).join('').slice(0,2)||'U').toUpperCase();

let _conversations = [];
let _activeUserId = null;
let _refreshTimer = null;

// Load conversations
async function loadConversations() {
  const list = document.getElementById('convList');
  try {
    const data = await api.messages.conversations();
    _conversations = data.conversations || data || [];

    // Check if URL has a userId param
    const urlParams = new URLSearchParams(window.location.search);
    const urlUserId = parseInt(urlParams.get('user'));
    const urlUserName = urlParams.get('name') || '';

    if (!_conversations.length && !urlUserId) {
      list.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--gray-mid);font-family:var(--font-mono);font-size:.72rem;letter-spacing:1px;">Aucune conversation</div>`;
      return;
    }

    // If URL has userId not in conversations, add temp entry
    if (urlUserId && !_conversations.find(c => c.partner_id === urlUserId)) {
      _conversations.unshift({ partner_id: urlUserId, partner_name: urlUserName || 'Contact', last_message: 'Démarrez la conversation…', last_message_at: new Date().toISOString(), unread: 0 });
    }

    renderConvList();

    // Auto-open from URL
    if (urlUserId) {
      openThread(urlUserId, urlUserName || _conversations[0]?.partner_name || 'Contact');
    } else if (_activeUserId) {
      // Re-select active
      document.querySelectorAll('.conv-item').forEach(el => el.classList.toggle('active', parseInt(el.dataset.uid) === _activeUserId));
    }
  } catch (err) {
    list.innerHTML = `<div style="padding:2rem;color:var(--accent2);font-size:.8rem;">${err.message}</div>`;
  }
}

let _filterQuery = '';
function filterConvs(q) {
  _filterQuery = q.toLowerCase();
  renderConvList();
}

function renderConvList() {
  const list = document.getElementById('convList');
  const filtered = _filterQuery ? _conversations.filter(c => c.partner_name?.toLowerCase().includes(_filterQuery)) : _conversations;

  if (!filtered.length) {
    list.innerHTML = `<div style="padding:1.5rem;text-align:center;color:var(--gray-mid);font-family:var(--font-mono);font-size:.7rem;">Aucun résultat</div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const initials = (c.partner_name||'??').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const time = c.last_message_at ? new Date(c.last_message_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
    const isActive = c.partner_id === _activeUserId;
    return `
      <div class="conv-item${isActive?' active':''}" data-uid="${c.partner_id}" onclick="openThread(${c.partner_id},'${c.partner_name?.replace(/'/g,"\\'")||''}')">
        <div class="conv-av">${initials}</div>
        <div class="conv-body">
          <div class="conv-name">${c.partner_name || 'Inconnu'}</div>
          <div class="conv-preview">${c.last_message || '…'}</div>
        </div>
        <div class="conv-right">
          <div class="conv-time">${time}</div>
          ${c.unread > 0 ? '<div class="conv-unread"></div>' : ''}
        </div>
      </div>
    `;
  }).join('');
}

async function openThread(userId, name) {
  _activeUserId = userId;
  document.querySelectorAll('.conv-item').forEach(el => el.classList.toggle('active', parseInt(el.dataset.uid) === userId));

  const panel = document.getElementById('threadPanel');
  const initials = (name||'??').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  panel.innerHTML = `
    <div class="thread-header">
      <div class="thread-av">${initials}</div>
      <div>
        <div class="thread-name">${name}</div>
        <div class="thread-role" id="threadRole">Chargement…</div>
      </div>
      <div class="thread-actions">
        <button class="thread-action-btn" onclick="viewProfile(${userId})">Voir profil</button>
      </div>
    </div>
    <div class="thread-messages" id="threadMessages"><div style="text-align:center;padding:2rem;color:var(--gray-mid);font-family:var(--font-mono);font-size:.72rem;">Chargement…</div></div>
    <div class="thread-input-area">
      <textarea class="msg-input" id="msgInput" placeholder="Votre message…" rows="1" onkeydown="handleInputKey(event,${userId})" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg(${userId})">Envoyer →</button>
    </div>
  `;

  loadThread(userId);

  // Auto-refresh
  clearInterval(_refreshTimer);
  _refreshTimer = setInterval(() => loadThread(userId, false), 8000);
}

async function loadThread(userId, scroll = true) {
  const container = document.getElementById('threadMessages');
  if (!container) return;

  try {
    const data = await api.messages.thread(userId);
    const messages = data.messages || data || [];

    if (!messages.length) {
      container.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--gray-mid);font-family:var(--font-mono);font-size:.72rem;">Démarrez la conversation en envoyant un message.</div>`;
      return;
    }

    // Group by date
    let lastDate = '';
    const html = messages.map(m => {
      const isMine = m.sender_id === _user.id;
      const msgDate = new Date(m.created_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'long' });
      const msgTime = new Date(m.created_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      let dateSep = '';
      if (msgDate !== lastDate) { dateSep = `<div class="thread-date-sep">${msgDate}</div>`; lastDate = msgDate; }
      return `${dateSep}
        <div class="msg-bubble ${isMine?'mine':'theirs'}">
          <div class="bubble-content">${escapeHtml(m.content)}</div>
          <div class="bubble-time">${msgTime}</div>
        </div>`;
    }).join('');

    container.innerHTML = html;
    if (scroll) container.scrollTop = container.scrollHeight;

    // Get partner role
    const roleEl = document.getElementById('threadRole');
    if (roleEl && messages.length > 0) {
      const partnerId = messages.find(m => m.sender_id !== _user.id)?.sender_id;
      if (partnerId) {
        roleEl.textContent = isProvider ? 'Client' : 'Prestataire';
      }
    }
  } catch (err) {
    if (container) container.innerHTML = `<div style="padding:2rem;color:var(--accent2);font-size:.8rem;">${err.message}</div>`;
  }
}

function handleInputKey(e, userId) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(userId); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMsg(userId) {
  const input = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  const content = input?.value?.trim();
  if (!content) return;

  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  try {
    await api.messages.send(userId, content);
    await loadThread(userId);
    loadConversations();
  } catch (err) {
    alert(err.message);
    input.value = content;
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

function viewProfile(userId) {
  const conv = _conversations.find(c => c.partner_id === userId);
  if (conv?.partner_provider_id) {
    window.location.href = `provider-profile.html?id=${conv.partner_provider_id}`;
  } else if (!isProvider) {
    window.location.href = `prestataires.html`;
  }
}

function newConversation() {
  window.location.href = 'prestataires.html';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

loadConversations();
lucide.createIcons();
</script>
</body>
</html>
